<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل الفيديو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .video-wrapper {
            background: black;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }
        
        video {
            width: 100%;
            display: block;
        }
        
        .video-info {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        
        .video-info h2 {
            color: #333;
            margin-bottom: 15px;
            word-break: break-word;
        }
        
        .share-section {
            background: white;
            padding: 20px;
            border-radius: 15px;
        }
        
        .share-section h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .share-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        #shareLink {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            background: #f9f9f9;
            direction: ltr;
            text-align: left;
        }
        
        #copyBtn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        #copyBtn:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }
        
        @media (max-width: 768px) {
            .share-box { flex-direction: column; }
            #copyBtn { width: 100%; }
        }
        body .custom-video-wrapper {
            margin: 0;
            width: 100%;
            /* height: 100%; */
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← العودة للرئيسية</a>
        
        <div class="video-wrapper">
            <video id="videoPlayer" controls>
                متصفحك لا يدعم تشغيل الفيديو.
            </video>
        </div>
        
        <div class="video-info">
            <h2 id="videoTitle">عنوان الفيديو</h2>
        </div>
        
        <div class="share-section">
            <h3>🔗 رابط المشاركة الدائم</h3>
            <div class="share-box">
                <input type="text" id="shareLink" readonly>
                <button id="copyBtn">📋 نسخ الرابط</button>
            </div>
            <p style="margin-top: 10px; font-size: 0.85rem; color: #666;">
                * يمكنك نسخ هذا الرابط ومشاركته، وعند فتحه سيظهر نفس الفيديو مباشرة.
            </p>
        </div>
    </div>
    
    <script src="data.js"></script>
    <script src="main.js"></script>
    <script src="vid.js"></script>
</body>
</html>
