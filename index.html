<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل الفيديوهات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .search-box {
            margin-bottom: 40px;
        }
        
        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        #searchInput:focus {
            outline: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transform: scale(1.01);
        }
        
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .video-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .video-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f0f0f0;
        }
        
        .video-card h3 {
            padding: 15px;
            font-size: 1rem;
            color: #333;
            text-align: center;
            word-break: break-word;
        }
        
        .no-results {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 40px;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .videos-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>مشغل الفيديوهات</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن فيديو...">
        </div>
        
        <div id="videosContainer" class="videos-grid">
            <!-- سيتم عرض الفيديوهات هنا بواسطة JavaScript -->
        </div>
    </div>
    
    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
